<style>
  :root{--accent:#c92020;--ink:#111;--line:#dcdcdc;--muted:#6b6b6b;--soft:#f6f6f6;--green:#1a7f37}
  *{box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Malgun Gothic','맑은 고딕',sans-serif;color:var(--ink);background:#fff;margin:0;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
  .wrap{max-width:720px;margin:0 auto;padding:20px 16px}
  .hd{border-left:3px solid var(--accent);padding-left:12px;margin-bottom:14px}
  .hd h1{font-size:18px;font-weight:700;margin:0}
  .hd p{font-size:12px;color:var(--muted);margin:2px 0 0}
  .tabs{display:flex;gap:8px;margin-bottom:16px}
  .tab{padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid var(--line);background:#fff;color:var(--muted);border-radius:3px}
  .tab.on{border-color:var(--ink);background:var(--ink);color:#fff}
  .card{border:1px solid var(--line);border-radius:3px;padding:14px;margin-bottom:16px}
  .card h2{font-size:13px;font-weight:700;margin:0 0 8px}
  label{font-size:11px;color:var(--muted);margin-bottom:3px;display:block}
  input,select,textarea{width:100%;padding:7px 9px;border:1px solid var(--line);border-radius:3px;font-size:13px;font-family:inherit;color:var(--ink);outline:none;background:#fff}
  textarea{resize:vertical;line-height:1.6}
  button{font-family:inherit;cursor:pointer}
  .run{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:3px;font-size:14px;font-weight:700}
  .hint{font-size:11px;color:var(--muted);margin-top:8px;line-height:1.5}
  .res{border:1px solid var(--line);border-radius:3px;margin-bottom:14px}
  .res .in{background:var(--soft);padding:8px 12px;font-size:12px;border-bottom:1px solid var(--line)}
  .res .bd{padding:12px;font-size:13px}
  .row{margin-bottom:8px}
  .badge{display:inline-block;border:1px solid var(--accent);color:var(--accent);border-radius:3px;padding:1px 6px;font-size:11px;margin-left:6px}
  table{width:100%;border-collapse:collapse;font-size:12px;margin-top:6px}
  th,td{padding:4px 6px;border:1px solid var(--line);text-align:left}
  th{background:var(--soft);color:var(--muted);font-weight:600}
  .price{margin-top:8px;padding:8px 10px;background:var(--soft);border-radius:3px;display:flex;justify-content:space-between;align-items:baseline}
  .price b{font-size:20px;color:var(--accent)}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .matrow{display:grid;grid-template-columns:70px 1fr 1fr;gap:8px;margin-bottom:8px;align-items:center}
  .install{position:fixed;left:16px;right:16px;bottom:16px;max-width:688px;margin:0 auto;background:var(--ink);color:#fff;border:none;border-radius:4px;padding:13px;font-size:14px;font-weight:700;display:none;z-index:50}
  .lo{color:var(--accent)} .hi{color:var(--green)} .mut{color:var(--muted)}
  .flx{display:flex;gap:8px;margin-top:10px;align-items:center}
  .fbtn{padding:11px 14px;border:1px solid var(--ink);border-radius:3px;font-size:13px;white-space:nowrap;cursor:pointer}
  .mono{font-family:monospace;font-size:12px}
  .modal-bd{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;justify-content:center;z-index:100}
  .modal{background:#fff;width:100%;max-width:720px;max-height:88vh;overflow:auto;border-radius:12px 12px 0 0;padding:18px 16px calc(18px + env(safe-area-inset-bottom))}
  .modal h2{font-size:16px;font-weight:700;margin:0 0 4px}
  .fixitem{border:1px solid var(--line);border-radius:6px;padding:12px;margin:12px 0;background:var(--soft)}
  .fixhd{font-weight:700;font-size:13px;margin-bottom:8px;word-break:break-all}
  .fixrow{margin-bottom:10px} .fixrow:last-child{margin-bottom:0}
</style>

function costEstimate(item){
  var c=state.cfg.cost;if(!c)return null;
  var id=item.id,od=item.od,h=item.h,mat=(item.material||"").toUpperCase(),cat=item.category,type=item.type||"",PI=Math.PI;
  if(id==null||od==null||!mat)return null;

  var matG=c.matPriceG[mat]||c.matPriceG._def,den=c.density[mat]||c.density._def;
  var bd=[],fallback=false,label=cat;
  function add(k,v){if(v>0)bd.push({k:k,v:Math.round(v)});}
  function ann(hh){return PI*(ro*ro-ri*ri)*hh;} // 환형 부피 mm³
  if(cat==="O-RING"){
    var cs=(od-id)/2,r=cs/2,R=ri+r,V=2*PI*PI*R*r*r;
    add("고무비("+mat+")",V*den/1000*matG);add("성형비",c.process.mold);add("후처리",c.process.finish);
  }else if(cat==="OIL SEAL"){
    var hh=h||(od-id)/2;
    add("고무비("+mat+")",c.rubberFill*ann(hh)*den/1000*matG);
    if(c.steelTypes.indexOf(type)>=0){var Vs=(PI*od*hh+PI*(ro*ro-ri*ri))*c.steelThk;add("철심비(STEEL)",Vs*c.density.STEEL/1000*c.steelPriceG+c.process.press);}
    if(c.springTypes.indexOf(type)>=0)add("스프링비",c.spring);
    add("접착/부자재",c.process.bond);add("성형비",c.process.mold);add("후처리",c.process.finish);
  }else if(cat==="DUST SEAL"){
    add("고무비("+mat+")",c.rubberFill*ann(h||5)*den/1000*matG);add("성형비",c.process.mold);add("후처리",c.process.finish);
  }else if(cat==="U-PACKING"){
    add("재료비("+mat+")",c.rubberFill*ann(h||(od-id)/2)*den/1000*matG);add("성형비",c.process.mold);add("후처리",c.process.finish);
  }else if(cat==="BACK UP RING"||cat==="WEAR RING"){
    add("재료비("+mat+"·절삭)",c.stockFactor*ann(h||(od-id)/2)*den/1000*matG);add("절삭가공비",c.process.machine);
  }else{

    html+='</div>';
  });

// ===== 도면(이미지/PDF) 자동 인식 =====
function fileToBase64(file,cb){var rd=new FileReader();rd.onload=function(ev){var s=String(ev.target.result),i=s.indexOf(",");cb(i>=0?s.slice(i+1):s);};rd.readAsDataURL(file);}
function downscaleImage(file,maxPx,quality,cb){
  var img=new Image(),url=URL.createObjectURL(file);
  img.onload=function(){
    var w=img.naturalWidth,h=img.naturalHeight,scale=Math.min(1,maxPx/Math.max(w,h));
    var cw=Math.max(1,Math.round(w*scale)),ch=Math.max(1,Math.round(h*scale));
    var c=document.createElement("canvas");c.width=cw;c.height=ch;
    c.getContext("2d").drawImage(img,0,0,cw,ch);URL.revokeObjectURL(url);
    var d=c.toDataURL("image/jpeg",quality||0.8),i=d.indexOf(",");cb(d.slice(i+1));
  };
  img.onerror=function(){URL.revokeObjectURL(url);cb(null);}; // 변환 실패(형식 미지원 등)
  img.src=url;
}

// PDF는 pdf.js로 페이지별 이미지로 변환(다중 페이지·대용량 대응, 서버 본문 4.5MB 제한 회피)
function loadPdfJs(){
  if(window.pdfjsLib)return Promise.resolve(window.pdfjsLib);
  return new Promise(function(res,rej){
    var s=document.createElement("script");
    s.src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
    s.onload=function(){if(window.pdfjsLib){try{window.pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";}catch(e){}res(window.pdfjsLib);}else rej(new Error("pdf.js 로드 실패"));};
    s.onerror=function(){rej(new Error("pdf.js 로드 실패(네트워크 확인)"));};
    document.head.appendChild(s);
  });
}
// 선택 파일들을 처리 단위(task)로 전개: 이미지 1장 = 1 task, PDF = 페이지 수만큼 task
function buildTasks(files){
  var tasks=[],chain=Promise.resolve();
  files.forEach(function(f){
    if(/^image\//.test(f.type)){tasks.push({kind:"image",file:f});}
    else if(f.type==="application/pdf"){
      chain=chain.then(function(){
        return loadPdfJs().then(function(pdfjs){
          return f.arrayBuffer().then(function(buf){
            return pdfjs.getDocument({data:new Uint8Array(buf)}).promise.then(function(doc){
              for(var p=1;p<=doc.numPages;p++)tasks.push({kind:"pdfpage",doc:doc,page:p});
            });
          });
        }).catch(function(e){tasks.push({kind:"error",msg:(e&&e.message)||"PDF 처리 실패"});});
      });
    }else{tasks.push({kind:"error",msg:"지원하지 않는 형식"});}
  });
  return chain.then(function(){return tasks;});
}
function renderTask(task){ // Promise<{payload}|{error}>
  if(task.kind==="error")return Promise.resolve({error:task.msg});
  if(task.kind==="image")return new Promise(function(res){downscaleImage(task.file,1400,0.8,function(b){res(b?{payload:{type:"image",media_type:"image/jpeg",data:b}}:{error:"이미지 변환 실패(형식 미지원일 수 있음, JPG/PNG 권장)"});});});
  if(task.kind==="pdfpage")return task.doc.getPage(task.page).then(function(page){
    var vp=page.getViewport({scale:1}),scale=Math.min(2.5,1500/Math.max(vp.width,vp.height)),v=page.getViewport({scale:scale});
    var c=document.createElement("canvas");c.width=Math.round(v.width);c.height=Math.round(v.height);
    return page.render({canvasContext:c.getContext("2d"),viewport:v}).promise.then(function(){
      var d=c.toDataURL("image/jpeg",0.8),i=d.indexOf(",");return{payload:{type:"image",media_type:"image/jpeg",data:d.slice(i+1)}};
    });
  }).catch(function(){return{error:"PDF 페이지 변환 실패"};});
  return Promise.resolve({error:"알 수 없는 작업"});
}
function postExtract(payload,attempt){
  return fetch("/api/extract",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({files:[payload]})})
    .then(function(r){return r.text().then(function(tx){var j;try{j=JSON.parse(tx);}catch(e){j={error:"서버가 JSON이 아닌 응답을 반환했습니다(HTTP "+r.status+"). 함수 미배포(404)이거나 서버 오류일 수 있습니다."};}return{ok:r.ok,status:r.status,j:j};});})
    .then(function(o){
      if(o.ok)return{text:((o.j&&o.j.text)||"").trim()};
      if((o.status===429||o.status>=500)&&attempt<2)return delay(1200*(attempt+1)).then(function(){return postExtract(payload,attempt+1);});
      return{error:(o.j&&o.j.error)||("HTTP "+o.status)};
    })
    .catch(function(err){
      if(attempt<2)return delay(1200*(attempt+1)).then(function(){return postExtract(payload,attempt+1);});
      return{error:(err&&err.message)||"네트워크 오류"};
    });
}
function extractFromDrawings(tasks){ // 동시 4개씩, 각 task를 이미지로 변환→인식
  var total=tasks.length,done=0,fail=0,lines=[],idx=0,active=0,CONC=4,firstError="";
  showOcrProgress(0,total,0);
  return new Promise(function(resolve){
    function finishOne(res){
      if(res.error){fail++;if(!firstError)firstError=res.error;}else if(res.text){lines.push(res.text);}
      done++;active--;showOcrProgress(done,total,fail);
      if(done>=total)resolve({text:lines.join("\n"),fail:fail,total:total,error:firstError});
      else launch();
    }
    function launch(){
      while(active<CONC&&idx<total){
        (function(task){
          active++;
          renderTask(task).then(function(rt){
            if(rt.error){finishOne({error:rt.error});return;}
            postExtract(rt.payload,0).then(finishOne);
          });
        })(tasks[idx++]);
      }
    }
    if(total===0){resolve({text:"",fail:0,total:0,error:""});return;}
    launch();
  });
}
function startDrawingUpload(files){
  if(!files.length)return;
  showOcrProgress(0,files.length,0);
  buildTasks(files).then(function(tasks){return extractFromDrawings(tasks);}).then(function(r){
    hideOcr();
    if(!r.text){
      showInfo("도면 인식 실패","도면/페이지 "+r.total+"건에서 품목을 인식하지 못했습니다."+(r.fail?(" ("+r.fail+"건 실패)"):"")
        +(r.error?("\n\n원인: "+r.error):"")
        +"\n\n• 도면이 흐리면 더 선명한 이미지를 올리거나 직접 입력해 주세요.");
      return;
    }
    state.text=r.text;runPipeline();renderRun();
    if(missingResults().length>0)openFixModal();
    else if(r.fail)showInfo("일부 인식 실패",r.total+"건 중 "+r.fail+"건은 실패해 제외했습니다."+(r.error?("\n\n예시 원인: "+r.error):"")+"\n나머지로 견적을 구성했습니다.");
  }).catch(function(e){hideOcr();showInfo("처리 오류",(e&&e.message)||"파일 처리 중 오류가 발생했습니다.");});
}

function collectQuoteItems(){

    else if(r.cost&&r.cost.ok){price=r.cost.sell;basis="원가적산";}
    return{raw:it.rawText,category:it.category,type:it.type||"",code:it.sourceCode||"",material:it.material||"",id:it.id,od:it.od,h:it.h,qty:it.qty,unit_price:price,basis:basis};

}

      // ===== 가격 (원가 적산 중심) =====
      var C=r.cost,H=r.hist,comps=r.comps||[];
      var headline=H?H.rec:(C&&C.ok?C.sell:null), hsrc=H?"실거래가":"원가적산";
      if(headline!=null)
        html+='<div class="price"><span style="font-size:12px;color:var(--muted)">추천가(개당) · '+hsrc+(H?(' '+esc(H.date)):'')+'</span><b>'+won(headline)+'원</b></div>';
      if(C&&C.ok){
        html+='<div style="margin-top:8px"><b>원가 적산</b> <span class="mut" style="font-size:11px">['+esc(C.category)+(C.fallback?' · 범용식':'')+']</span><table style="margin-top:2px"><tbody>';
        C.breakdown.forEach(function(x){html+='<tr><td class="mut">'+esc(x.k)+'</td><td style="text-align:right">'+won(x.v)+'원</td></tr>';});
        html+='<tr><td>제조원가</td><td style="text-align:right">'+won(C.mfg)+'원</td></tr>'
          +'<tr><td class="mut">×(로스'+Math.round(C.rates.loss*100)+'·판관'+Math.round(C.rates.sga*100)+'·이익'+Math.round(C.rates.profit*100)+'%)</td><td style="text-align:right;font-weight:700">'+won(C.sell)+'원</td></tr>'
          +'</tbody></table><div class="hint" style="margin-top:2px">단가·공정비는 설정 탭 "원가 파라미터"에서 조정(현재 임시값).</div></div>';
      }
      if(H){
        html+='<div style="margin-top:8px"><b>실거래 이력</b> <span class="mut" style="font-size:11px">['+esc(keyDesc(H.key))+']</span>'
          +'<div class="mut" style="font-size:12px">'+H.basis+' '+H.n+'건 · 범위 '+won(H.min)+'~'+won(H.max)+'원'+(H.vol?' <span class="lo">⚠편차큼</span>':'')+'</div>';
        if(H.samples&&H.samples.length){html+='<table style="margin-top:2px"><tbody>';H.samples.forEach(function(s){html+='<tr><td class="mut">'+esc(s[0])+'</td><td style="text-align:right">'+won(s[1])+'원</td></tr>';});html+='</tbody></table>';}
        html+='</div>';
      }else if(comps.length){
        html+='<div style="margin-top:8px"><b>유사 실거래 (교차검증)</b><table style="margin-top:2px"><thead><tr><th>규격</th><th>재질</th><th style="text-align:right">단가</th></tr></thead><tbody>';
        comps.slice(0,5).forEach(function(c){html+='<tr><td class="mono">'+esc(c.dim)+'</td><td>'+esc(c.mat||"-")+'</td><td style="text-align:right">'+won(c.price)+'원</td></tr>';});
        html+='</tbody></table></div>';
      }
      html+='</div></div>';
    });
  }
  var pane=document.getElementById("paneRun");
  pane.innerHTML=html;
  document.getElementById("runBtn").onclick=function(){state.text=document.getElementById("ta").value;persist();runPipeline();renderRun();if(missingResults().length>0)openFixModal();};
  document.getElementById("ta").oninput=function(e){state.text=e.target.value;};
  document.getElementById("file").onchange=function(e){
    var fl=Array.prototype.slice.call(e.target.files||[]);if(!fl.length)return;
    var draw=fl.filter(function(f){return /^image\//.test(f.type)||f.type==="application/pdf";});
    if(draw.length){startDrawingUpload(draw);e.target.value="";return;}
    var f=fl[0];var rd=new FileReader();rd.onload=function(ev){state.text=String(ev.target.result).slice(0,4000);runPipeline();renderRun();if(missingResults().length>0)openFixModal();};rd.readAsText(f);};
  var ofb=document.getElementById("openFix");if(ofb)ofb.onclick=openFixModal;
  var clb=document.getElementById("clearBtn");if(clb)clb.onclick=function(){state.text="";state.results=null;renderRun();};
  var svb=document.getElementById("saveBtn");if(svb)svb.onclick=function(){saveQuote(this);};
  var hsb=document.getElementById("histBtn");if(hsb)hsb.onclick=openHistory;
}

function renderCfg(){
  var c=state.cfg;
  var html='<div class="card"><h2>부피 계산식 (제품 형태별)</h2><div class="hint" style="margin-top:0;margin-bottom:10px">변수: id(내경) od(외경) h(높이) PI. mm³ 반환.</div>';
  Object.keys(state.shapes).forEach(function(cat){
    html+='<div style="margin-bottom:12px"><label>'+cat+' — '+state.shapes[cat].label+'</label>'
      +'<textarea class="mono shapeF" data-cat="'+cat+'" rows="2">'+esc(state.shapes[cat].formula)+'</textarea></div>';
  });
  html+='</div><div class="card"><h2>재질별 비중(g/cm³) · 단가(원/g)</h2>';
  ["NBR","FKM","EPDM","SILICON"].forEach(function(m){
    html+='<div class="matrow"><span style="font-size:13px">'+m+'</span>'
      +'<input class="den" data-m="'+m+'" value="'+c.density[m]+'"><input class="up" data-m="'+m+'" value="'+c.unitPrice[m]+'"></div>';
  });
  html+='</div><div class="card"><h2>공통 설정값</h2><div class="grid3">'
    +'<div><label>고정비(원/개)</label><input id="fc" value="'+c.fixedCost+'"></div>'
    +'<div><label>로스율(0.1=10%)</label><input id="lr" value="'+c.lossRate+'"></div>'
    +'<div><label>수량계수</label><input id="qf" value="'+c.qtyFactor+'"></div></div>'
    +'<div class="hint">무게기반 계산은 실거래·AI 추정이 모두 불가할 때만 쓰는 최후 보조값입니다.</div></div>';
  var ac=aiCfg();
  html+='<div class="card"><h2>AI 추정 설정 (이력 없는 품목 가격 도출)</h2>'
    +'<div class="grid3">'
    +'<div><label>유사품 개수</label><input id="aiN" value="'+ac.nComp+'"></div>'
    +'<div><label>마진계수(1=그대로)</label><input id="aiM" value="'+ac.margin+'"></div>'
    +'<div><label>재질 엄격매칭</label><select id="aiS"><option value="0"'+(ac.sameMatOnly?"":" selected")+'>아니오(유사재질 허용)</option><option value="1"'+(ac.sameMatOnly?" selected":"")+'>예(동일재질만)</option></select></div>'
    +'</div>'
    +'<label style="margin-top:10px">AI 가격정책 지침 (선택 — AI가 추론 시 우선 적용)</label>'
    +'<textarea id="aiP" rows="3" placeholder="예) 신규 거래처는 10% 높게. 오링은 최소 300원. 대형(외경 200 이상)은 가공비 가산.">'+esc(ac.policy)+'</textarea>'
    +'<div class="hint">AI는 위 설정 + 회사 실거래 중 가장 가까운 유사품을 근거로 단가를 추론합니다. 각 견적 결과에 "분석에 사용한 유사 실거래"가 함께 표시됩니다.</div></div>';
  var ct=state.cfg.cost;
  html+='<div class="card"><h2>원가 파라미터 (※ 임시값 — 실제 단가로 교체)</h2>'
    +'<label>비율</label><div class="grid3">'
    +'<div><label>로스율</label><input class="ck" data-p="rates.loss" value="'+ct.rates.loss+'"></div>'
    +'<div><label>판관비율</label><input class="ck" data-p="rates.sga" value="'+ct.rates.sga+'"></div>'
    +'<div><label>이익율</label><input class="ck" data-p="rates.profit" value="'+ct.rates.profit+'"></div></div>'
    +'<label style="margin-top:8px">소재 단가(원/g)</label><div class="grid3">'
    +["NBR","FKM","EPDM","SILICON","PU","PTFE","NYLON","PHENOLIC"].map(function(m){return '<div><label>'+m+'</label><input class="ck" data-p="matPriceG.'+m+'" value="'+(ct.matPriceG[m]!=null?ct.matPriceG[m]:"")+'"></div>';}).join("")+'</div>'
    +'<label style="margin-top:8px">철심·스프링·충전</label><div class="grid3">'
    +'<div><label>강재(원/g)</label><input class="ck" data-p="steelPriceG" value="'+ct.steelPriceG+'"></div>'
    +'<div><label>철심두께(mm)</label><input class="ck" data-p="steelThk" value="'+ct.steelThk+'"></div>'
    +'<div><label>스프링(원/개)</label><input class="ck" data-p="spring" value="'+ct.spring+'"></div>'
    +'<div><label>고무충전율</label><input class="ck" data-p="rubberFill" value="'+ct.rubberFill+'"></div>'
    +'<div><label>절삭소재계수</label><input class="ck" data-p="stockFactor" value="'+ct.stockFactor+'"></div></div>'
    +'<label style="margin-top:8px">공정비(원/개)</label><div class="grid3">'
    +'<div><label>성형</label><input class="ck" data-p="process.mold" value="'+ct.process.mold+'"></div>'
    +'<div><label>절삭</label><input class="ck" data-p="process.machine" value="'+ct.process.machine+'"></div>'
    +'<div><label>후처리</label><input class="ck" data-p="process.finish" value="'+ct.process.finish+'"></div>'
    +'<div><label>접착/부자재</label><input class="ck" data-p="process.bond" value="'+ct.process.bond+'"></div>'
    +'<div><label>프레스</label><input class="ck" data-p="process.press" value="'+ct.process.press+'"></div>'
    +'<div><label>타발</label><input class="ck" data-p="process.punch" value="'+ct.process.punch+'"></div></div>'
    +'<div class="hint">오일씰 철심 적용 타입: '+ct.steelTypes.join(",")+' / 스프링 타입: '+ct.springTypes.join(",")+'. 견적 결과가 원가 항목별로 분해되어 표시됩니다.</div></div>';
  var pane=document.getElementById("paneCfg");
  pane.innerHTML=html;
  // 바인딩
  Array.prototype.forEach.call(pane.querySelectorAll(".shapeF"),function(el){el.oninput=function(){state.shapes[el.getAttribute("data-cat")].formula=el.value;persist();};});
  Array.prototype.forEach.call(pane.querySelectorAll(".den"),function(el){el.oninput=function(){state.cfg.density[el.getAttribute("data-m")]=parseFloat(el.value)||0;persist();};});
  Array.prototype.forEach.call(pane.querySelectorAll(".up"),function(el){el.oninput=function(){state.cfg.unitPrice[el.getAttribute("data-m")]=parseFloat(el.value)||0;persist();};});
  pane.querySelector("#fc").oninput=function(e){state.cfg.fixedCost=parseFloat(e.target.value)||0;persist();};
  pane.querySelector("#lr").oninput=function(e){state.cfg.lossRate=parseFloat(e.target.value)||0;persist();};
  pane.querySelector("#qf").oninput=function(e){state.cfg.qtyFactor=parseFloat(e.target.value)||1;persist();};
  function ensureAi(){state.cfg.ai=state.cfg.ai||{nComp:6,sameMatOnly:false,margin:1,policy:""};return state.cfg.ai;}
  pane.querySelector("#aiN").oninput=function(e){ensureAi().nComp=Math.max(1,Math.min(12,parseInt(e.target.value)||6));persist();};
  pane.querySelector("#aiM").oninput=function(e){ensureAi().margin=parseFloat(e.target.value)||1;persist();};
  pane.querySelector("#aiS").onchange=function(e){ensureAi().sameMatOnly=e.target.value==="1";persist();};
  pane.querySelector("#aiP").oninput=function(e){ensureAi().policy=e.target.value;persist();};
  Array.prototype.forEach.call(pane.querySelectorAll(".ck"),function(el){el.oninput=function(){
    var p=el.getAttribute("data-p").split("."),o=state.cfg.cost;
    for(var i=0;i<p.length-1;i++)o=o[p[i]]=o[p[i]]||{};
    o[p[p.length-1]]=parseFloat(el.value)||0;persist();
  };});
}

function switchTab(t){
  state.tab=t;
  document.getElementById("tabRun").className="tab"+(t==="run"?" on":"");
  document.getElementById("tabCfg").className="tab"+(t==="config"?" on":"");
  document.getElementById("paneRun").style.display=t==="run"?"":"none";
  document.getElementById("paneCfg").style.display=t==="config"?"":"none";
  if(t==="config")renderCfg();
}
document.getElementById("tabRun").onclick=function(){switchTab("run");};
document.getElementById("tabCfg").onclick=function(){switchTab("config");};

// 초기 실행
runPipeline();
renderRun();
loadPriceHistory();

// ===== PWA service worker =====
if("serviceWorker" in navigator){
  try{
    // network-first: 온라인이면 항상 최신본을 받아 캐시 갱신, 오프라인일 때만 캐시 사용(설치된 PWA가 업데이트를 받도록)
    var swCode='var C="hansung-quote-v2";self.addEventListener("install",function(e){self.skipWaiting();});self.addEventListener("activate",function(e){e.waitUntil(Promise.all([clients.claim(),caches.keys().then(function(ks){return Promise.all(ks.map(function(k){return k===C?null:caches.delete(k);}));})]));});self.addEventListener("fetch",function(e){if(e.request.method!=="GET")return;e.respondWith(fetch(e.request).then(function(res){if(res&&res.ok){var cl=res.clone();caches.open(C).then(function(c){c.put(e.request,cl);});}return res;}).catch(function(){return caches.match(e.request);}));});';
    var blob=new Blob([swCode],{type:"text/javascript"});
    navigator.serviceWorker.register(URL.createObjectURL(blob))["catch"](function(){});
  }catch(e){}
}
// ===== 설치 버튼 =====
var deferredPrompt=null;
var btn=document.getElementById("installBtn");
window.addEventListener("beforeinstallprompt",function(e){e.preventDefault();deferredPrompt=e;btn.style.display="block";});
btn.addEventListener("click",function(){if(!deferredPrompt)return;deferredPrompt.prompt();deferredPrompt.userChoice.then(function(){deferredPrompt=null;btn.style.display="none";});});
window.addEventListener("appinstalled",function(){btn.style.display="none";});
</script>
