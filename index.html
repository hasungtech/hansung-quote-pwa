<style>
  :root{--accent:#c92020;--ink:#111;--line:#dcdcdc;--muted:#6b6b6b;--soft:#f6f6f6;--green:#1a7f37}
  *{box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Malgun Gothic','맑은 고딕',sans-serif;color:var(--ink);background:#fff;margin:0;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
  .wrap{max-width:720px;margin:0 auto;padding:20px 16px}
  .hd{border-left:3px solid var(--accent);padding-left:12px;margin-bottom:14px}
  .hd h1{font-size:18px;font-weight:700;margin:0}
  .hd p{font-size:12px;color:var(--muted);margin:2px 0 0}
  .tabs{display:flex;gap:8px;margin-bottom:16px}
  .tab{padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid var(--line);background:#fff;color:var(--muted);border-radius:3px}
  .tab.on{border-color:var(--ink);background:var(--ink);color:#fff}
  .card{border:1px solid var(--line);border-radius:3px;padding:14px;margin-bottom:16px}
  .card h2{font-size:13px;font-weight:700;margin:0 0 8px}
  label{font-size:11px;color:var(--muted);margin-bottom:3px;display:block}
  input,select,textarea{width:100%;padding:7px 9px;border:1px solid var(--line);border-radius:3px;font-size:13px;font-family:inherit;color:var(--ink);outline:none;background:#fff}
  textarea{resize:vertical;line-height:1.6}
  button{font-family:inherit;cursor:pointer}
  .run{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:3px;font-size:14px;font-weight:700}
  .hint{font-size:11px;color:var(--muted);margin-top:8px;line-height:1.5}
  .res{border:1px solid var(--line);border-radius:3px;margin-bottom:14px}
  .res .in{background:var(--soft);padding:8px 12px;font-size:12px;border-bottom:1px solid var(--line)}
  .res .bd{padding:12px;font-size:13px}
  .row{margin-bottom:8px}
  .badge{display:inline-block;border:1px solid var(--accent);color:var(--accent);border-radius:3px;padding:1px 6px;font-size:11px;margin-left:6px}
  table{width:100%;border-collapse:collapse;font-size:12px;margin-top:6px}
  th,td{padding:4px 6px;border:1px solid var(--line);text-align:left}
  th{background:var(--soft);color:var(--muted);font-weight:600}
  .price{margin-top:8px;padding:8px 10px;background:var(--soft);border-radius:3px;display:flex;justify-content:space-between;align-items:baseline}
  .price b{font-size:20px;color:var(--accent)}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .matrow{display:grid;grid-template-columns:70px 1fr 1fr;gap:8px;margin-bottom:8px;align-items:center}
  .install{position:fixed;left:16px;right:16px;bottom:16px;max-width:688px;margin:0 auto;background:var(--ink);color:#fff;border:none;border-radius:4px;padding:13px;font-size:14px;font-weight:700;display:none;z-index:50}
  .lo{color:var(--accent)} .hi{color:var(--green)} .mut{color:var(--muted)}
  .flx{display:flex;gap:8px;margin-top:10px;align-items:center}
  .fbtn{padding:11px 14px;border:1px solid var(--ink);border-radius:3px;font-size:13px;white-space:nowrap;cursor:pointer}
  .mono{font-family:monospace;font-size:12px}

  var den=cfg.density[m],up=cfg.unitPrice[m];
  var weightG=vol*(den/1000),materialCost=weightG*up,subtotal=cfg.fixedCost+materialCost;
  return{ok:true,volumeMm3:vol,weightG:weightG,densityCm3:den,unitPriceGram:up,materialCost:materialCost,fixedCost:cfg.fixedCost,subtotal:subtotal,lossRate:cfg.lossRate,unitPrice:subtotal*(1+cfg.lossRate)*cfg.qtyFactor};
}
var SAMPLE_HISTORY=[
  {code:"TC21024015",type:"TC",oringCode:"",digits:"21024015",winRate:27.3,customers:2,avgWonPrice:7400,avgQuotePrice:8200},
  {code:"TC506509",type:"TC",oringCode:"",digits:"506509",winRate:42,customers:5,avgWonPrice:2500,avgQuotePrice:2800},
  {code:"G145F",type:"",oringCode:"G145F",digits:"145",winRate:20.2,customers:5,avgWonPrice:3044,avgQuotePrice:2937},
  {code:"P560",type:"",oringCode:"P560",digits:"560",winRate:0,customers:1,avgWonPrice:0,avgQuotePrice:12709}
];
function matchHistory(item){
  var code=nc(item.sourceCode);
  var op=code&&(/^(AS568|[PGS])/.test(code)||item.category==="O-RING");
  var sc=[];
  if(op){for(var i=0;i<SAMPLE_HISTORY.length;i++){var row=SAMPLE_HISTORY[i];if(!row.oringCode)continue;var rc=nc(row.oringCode);if(rc===code)sc.push({row:row,s:100});else if(rc.indexOf(code)===0||code.indexOf(rc)===0)sc.push({row:row,s:50});}}
  else{var t=(item.type||"").toUpperCase();if(!t)return[];var q=[item.id,item.od,item.h].filter(function(n){return n!=null;}).map(function(n){return String(Math.round(n));});var j=q.join("");for(var k=0;k<SAMPLE_HISTORY.length;k++){var r2=SAMPLE_HISTORY[k];if((r2.type||"").toUpperCase()!==t)continue;var s=10;if(j&&r2.digits.indexOf(j)>=0)s+=40;for(var m=0;m<q.length;m++)if(r2.digits.indexOf(q[m])>=0)s+=15;sc.push({row:r2,s:s});}}
  sc.sort(function(a,b){return b.s-a.s||b.row.winRate-a.row.winRate;});
  return sc.slice(0,5).map(function(o){var row=o.row;return{code:row.code,winRate:row.winRate,customers:row.customers,
    recommendedPrice:row.avgWonPrice>0?{value:row.avgWonPrice,basis:"won"}:row.avgQuotePrice>0?{value:row.avgQuotePrice,basis:"quote"}:{value:null,basis:"none"}};});
}
var RL={DIMS_MISSING:"치수 없음",UNKNOWN_CODE:"미지 코드",AMBIGUOUS_CODE:"코드 모호",CATEGORY_UNKNOWN:"제품군 미상",MATERIAL_MISSING:"재질 미상",QTY_MISSING:"수량 없음"};
// 누락 정보 입력 안내 문구(무엇을·예시로 어떻게 입력할지)
var GUIDE={
  DIMS_MISSING:"치수(내경×외경×높이)를 입력해 주세요. 예) 50x65x9",
  UNKNOWN_CODE:"규격표에 없는 코드입니다. 치수를 직접 입력해 주세요. 예) 50x65x9",
  AMBIGUOUS_CODE:"코드 후보가 여러 개입니다. 치수를 함께 입력해 구분해 주세요.",
  CATEGORY_UNKNOWN:"제품 종류를 알 수 없습니다. 타입(TC/SC…) 또는 코드(P50/AS568-150)를 입력해 주세요.",
  MATERIAL_MISSING:"재질을 입력해 주세요. 예) NBR, FKM, EPDM, SILICON",
  QTY_MISSING:"수량을 입력해 주세요. 예) 30개"
};
function won(n){return n==null?"—":Math.round(n).toLocaleString("ko-KR");}
function esc(s){return String(s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}

// ===== 상태 =====
var state={
  text:"현대당진 오일씰 TC 50x65x9 NBR 30개\nP50 NBR 100개\nAN374 FKM 20개\nTC 40x62x11 50개",
  cfg:{density:{NBR:1.3,FKM:1.9,EPDM:1.2,SILICON:1.2},unitPrice:{NBR:129,FKM:645,EPDM:154.8,SILICON:258},fixedCost:150,lossRate:0.1,qtyFactor:1,fallbackDensity:1.3,fallbackUnitPrice:129},
  shapes:JSON.parse(JSON.stringify(DEFAULT_SHAPES)),
  tab:"run", results:null
};

function runPipeline(){
  state.results=parseText(state.text).map(function(raw){
    var lookup=lookupCode(raw.sourceCode);
    var c=classify(raw,lookup);
    var matches=[],est=null;
    if(c.item.confidence==="high"){matches=matchHistory(c.item);if(matches.length===0)est=estimate(c.item,state.cfg,state.shapes);}
    return{raw:raw,lookup:lookup,c:c,matches:matches,est:est};
  });
}

function renderRun(){
  var html='<div class="card"><h2>문의 입력 (자연어·여러 줄)</h2>'
    +'<textarea id="ta" rows="5">'+esc(state.text)+'</textarea>'
    +'<div class="flx"><button class="run" id="runBtn" style="flex:1">인식 & 견적 실행</button>'
    +'<label class="fbtn">파일<input type="file" id="file" accept=".txt,.csv" style="display:none"></label></div>'
    +'<div class="hint">한 줄에 한 품목. 인식: 타입(TC/SC…)·치수(50x65x9, 일본식 5,7)·코드(P50/AS568-150/AN374)·재질·수량. 실제 도면 OCR은 Firebase+Gemini.</div></div>';
  if(state.results){
    if(state.results.length===0)html+='<div class="card mut">'+(state.text.trim()?'인식된 품목이 없습니다. 타입·치수·코드·재질·수량을 확인해 주세요.':'문의 내용을 입력해 주세요.')+'</div>';
    // 입력이 필요한(정보 누락) 품목 요약 안내
    var need=state.results.filter(function(r){return r.c.reasons.length>0;});
    if(need.length>0){
      html+='<div class="card" style="border-color:var(--accent);background:#fdf3f3">'
        +'<h2 style="color:var(--accent)">⚠ 입력이 필요한 정보가 있습니다 ('+need.length+'건)</h2>'
        +'<div class="hint" style="margin-top:0;color:var(--ink)">아래 품목에 빠진 정보를 채워 다시 실행해 주세요.</div>';
      need.forEach(function(r){
        var labels=r.c.reasons.map(function(rs){return RL[rs]||rs;}).join(", ");
        html+='<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--line)"><b>'+esc(r.raw.rawText)+'</b><br>'
          +'<span class="lo" style="font-size:12px">필요: '+esc(labels)+'</span></div>';
      });
      html+='</div>';
    }
    state.results.forEach(function(r){
      html+='<div class="res"><div class="in"><b>입력:</b> <span class="mut">'+esc(r.raw.rawText)+'</span></div><div class="bd">';
      html+='<div class="row"><b class="hi">인식</b> · '+esc(r.raw.category)+' '+esc(r.raw.type)+' '+esc(r.raw.sourceCode)
        +(r.raw.material?' / '+r.raw.material:'')
        +(r.raw.id!=null?' / '+r.raw.id+'×'+r.raw.od+'×'+(r.raw.h!=null?r.raw.h:'—'):'')
        +' / '+(r.raw.qty||'?')+'개</div>';
      if(r.raw.sourceCode){
        html+='<div class="row mut"><b style="color:var(--ink)">코드해석</b> · ';
        if(r.lookup)html+=r.lookup.ambiguous?(r.lookup.code+' → 후보 '+r.lookup.variants.length+'개(모호)'):(r.lookup.code+' → 내경 '+r.lookup.variants[0].id+' / 외경 '+r.lookup.variants[0].od);
        else html+='<span class="lo">'+esc(r.raw.sourceCode)+' → 규격표에 없음</span>';
        html+='</div>';
      }
      html+='<div class="row"><b>판정</b> · <b class="'+(r.c.item.confidence==="high"?"hi":"lo")+'">'+(r.c.item.confidence==="high"?"HIGH":"LOW")+'</b>';
      r.c.reasons.forEach(function(rs){html+='<span class="badge">'+(RL[rs]||rs)+'</span>';});
      html+='</div>';
      if(r.c.item.confidence==="low"){
        html+='<div style="padding:8px 10px;background:#fdf3f3;border-radius:3px;color:var(--accent);font-size:12.5px">→ 확인 대기함 — 아래 정보를 입력해 주세요'
          +'<ul style="margin:6px 0 0;padding-left:18px;line-height:1.6">';
        r.c.reasons.forEach(function(rs){html+='<li>'+esc(GUIDE[rs]||RL[rs]||rs)+'</li>';});
        if(r.c.candidates)html+='<li>후보 '+r.c.candidates.length+'개 중 하나를 선택해 주세요.</li>';
        html+='</ul></div>';
      }else if(r.matches.length>0){
        html+='<b>수주이력 매칭</b><table><thead><tr><th>코드</th><th>수주율</th><th>거래처</th><th>추천가</th><th>근거</th></tr></thead><tbody>';
        r.matches.forEach(function(m){
          html+='<tr><td>'+esc(m.code)+'</td><td class="'+(m.winRate>=40?"hi":m.winRate>0?"":"lo")+'">'+m.winRate+'%</td><td>'+m.customers+'곳</td>'
            +'<td style="text-align:right;font-weight:700">'+won(m.recommendedPrice.value)+'원</td>'
            +'<td class="mut">'+(m.recommendedPrice.basis==="won"?"실수주":m.recommendedPrice.basis==="quote"?"견적":"—")+'</td></tr>';
        });
        html+='</tbody></table>';
      }else if(r.est){
        if(r.est.ok){
          html+='<b>신규 견적(무게 기반)</b><div style="font-size:12px;color:var(--muted);margin-top:4px;line-height:1.7">'
            +'부피 '+won(r.est.volumeMm3)+'mm³ → 무게 '+r.est.weightG.toFixed(2)+'g(비중 '+r.est.densityCm3+') → 재료비 '+won(r.est.materialCost)+'원('+r.est.unitPriceGram+'원/g) + 고정비 '+won(r.est.fixedCost)+' → ×'+(1+r.est.lossRate).toFixed(2)+'</div>'
            +'<div class="price"><span style="font-size:12px;color:var(--muted)">기준 견적가(개당)</span><b>'+won(r.est.unitPrice)+'원</b></div>';
        }else{
          var em=r.est.reason==="NO_SHAPE"?"이 제품군 부피공식 미정(설정 탭에서 추가)":r.est.reason==="MISSING_DIMS"?"필수 치수 누락":r.est.reason==="NO_MATERIAL"?"재질 미상 — 재질 확인 필요(단가 결정 불가)":r.est.reason==="UNKNOWN_MATERIAL"?("미등록 재질 "+(r.est.material||"")+" — 설정 탭에 비중·단가 추가 필요"):"치수 오류";
          html+='<div class="lo" style="font-size:12.5px">견적 불가: '+em+'</div>';
        }
      }
      html+='</div></div>';
    });
  }
  var pane=document.getElementById("paneRun");
  pane.innerHTML=html;
  document.getElementById("runBtn").onclick=function(){state.text=document.getElementById("ta").value;runPipeline();renderRun();};
  document.getElementById("ta").oninput=function(e){state.text=e.target.value;};
  document.getElementById("file").onchange=function(e){var f=e.target.files[0];if(!f)return;var rd=new FileReader();rd.onload=function(ev){state.text=String(ev.target.result).slice(0,4000);runPipeline();renderRun();};rd.readAsText(f);};
}

function renderCfg(){
  var c=state.cfg;
  var html='<div class="card"><h2>부피 계산식 (제품 형태별)</h2><div class="hint" style="margin-top:0;margin-bottom:10px">변수: id(내경) od(외경) h(높이) PI. mm³ 반환.</div>';
  Object.keys(state.shapes).forEach(function(cat){
    html+='<div style="margin-bottom:12px"><label>'+cat+' — '+state.shapes[cat].label+'</label>'
      +'<textarea class="mono shapeF" data-cat="'+cat+'" rows="2">'+esc(state.shapes[cat].formula)+'</textarea></div>';
  });
  html+='</div><div class="card"><h2>재질별 비중(g/cm³) · 단가(원/g)</h2>';
  ["NBR","FKM","EPDM","SILICON"].forEach(function(m){
    html+='<div class="matrow"><span style="font-size:13px">'+m+'</span>'
      +'<input class="den" data-m="'+m+'" value="'+c.density[m]+'"><input class="up" data-m="'+m+'" value="'+c.unitPrice[m]+'"></div>';
  });
  html+='</div><div class="card"><h2>공통 설정값</h2><div class="grid3">'
    +'<div><label>고정비(원/개)</label><input id="fc" value="'+c.fixedCost+'"></div>'
    +'<div><label>로스율(0.1=10%)</label><input id="lr" value="'+c.lossRate+'"></div>'
    +'<div><label>수량계수</label><input id="qf" value="'+c.qtyFactor+'"></div></div>'
    +'<div class="hint">기본값은 8,692개 견적 역산 + 표준 가정. 실제 견적과 비교하며 조정. 조정 후 "견적 실행" 탭에서 재실행.</div></div>';
  var pane=document.getElementById("paneCfg");
  pane.innerHTML=html;
  // 바인딩
  Array.prototype.forEach.call(pane.querySelectorAll(".shapeF"),function(el){el.oninput=function(){state.shapes[el.getAttribute("data-cat")].formula=el.value;};});
  Array.prototype.forEach.call(pane.querySelectorAll(".den"),function(el){el.oninput=function(){state.cfg.density[el.getAttribute("data-m")]=parseFloat(el.value)||0;};});
  Array.prototype.forEach.call(pane.querySelectorAll(".up"),function(el){el.oninput=function(){state.cfg.unitPrice[el.getAttribute("data-m")]=parseFloat(el.value)||0;};});
  pane.querySelector("#fc").oninput=function(e){state.cfg.fixedCost=parseFloat(e.target.value)||0;};
  pane.querySelector("#lr").oninput=function(e){state.cfg.lossRate=parseFloat(e.target.value)||0;};
  pane.querySelector("#qf").oninput=function(e){state.cfg.qtyFactor=parseFloat(e.target.value)||1;};
}

function switchTab(t){
  state.tab=t;
  document.getElementById("tabRun").className="tab"+(t==="run"?" on":"");
  document.getElementById("tabCfg").className="tab"+(t==="config"?" on":"");
  document.getElementById("paneRun").style.display=t==="run"?"":"none";
  document.getElementById("paneCfg").style.display=t==="config"?"":"none";
  if(t==="config")renderCfg();
}
document.getElementById("tabRun").onclick=function(){switchTab("run");};
document.getElementById("tabCfg").onclick=function(){switchTab("config");};

// 초기 실행
runPipeline();
renderRun();

// ===== PWA service worker =====
if("serviceWorker" in navigator){
  try{
    // network-first: 온라인이면 항상 최신본을 받아 캐시 갱신, 오프라인일 때만 캐시 사용(설치된 PWA가 업데이트를 받도록)
    var swCode='var C="hansung-quote-v2";self.addEventListener("install",function(e){self.skipWaiting();});self.addEventListener("activate",function(e){e.waitUntil(Promise.all([clients.claim(),caches.keys().then(function(ks){return Promise.all(ks.map(function(k){return k===C?null:caches.delete(k);}));})]));});self.addEventListener("fetch",function(e){if(e.request.method!=="GET")return;e.respondWith(fetch(e.request).then(function(res){if(res&&res.ok){var cl=res.clone();caches.open(C).then(function(c){c.put(e.request,cl);});}return res;}).catch(function(){return caches.match(e.request);}));});';
    var blob=new Blob([swCode],{type:"text/javascript"});
    navigator.serviceWorker.register(URL.createObjectURL(blob))["catch"](function(){});
  }catch(e){}
}

var btn=document.getElementById("installBtn");
window.addEventListener("beforeinstallprompt",function(e){e.preventDefault();deferredPrompt=e;btn.style.display="block";});
