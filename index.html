<style>
  :root{--accent:#c92020;--ink:#111;--line:#dcdcdc;--muted:#6b6b6b;--soft:#f6f6f6;--green:#1a7f37}
  *{box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Malgun Gothic','맑은 고딕',sans-serif;color:var(--ink);background:#fff;margin:0;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
  .wrap{max-width:720px;margin:0 auto;padding:20px 16px}
  .hd{border-left:3px solid var(--accent);padding-left:12px;margin-bottom:14px}
  .hd h1{font-size:18px;font-weight:700;margin:0}
  .hd p{font-size:12px;color:var(--muted);margin:2px 0 0}
  .tabs{display:flex;gap:8px;margin-bottom:16px}
  .tab{padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid var(--line);background:#fff;color:var(--muted);border-radius:3px}
  .tab.on{border-color:var(--ink);background:var(--ink);color:#fff}
  .card{border:1px solid var(--line);border-radius:3px;padding:14px;margin-bottom:16px}
  .card h2{font-size:13px;font-weight:700;margin:0 0 8px}
  label{font-size:11px;color:var(--muted);margin-bottom:3px;display:block}
  input,select,textarea{width:100%;padding:7px 9px;border:1px solid var(--line);border-radius:3px;font-size:13px;font-family:inherit;color:var(--ink);outline:none;background:#fff}
  @media (max-width:480px){input,select,textarea{font-size:16px}} /* iOS 포커스 시 자동 확대(줌) 방지 */
  textarea{resize:vertical;line-height:1.6}
  button{font-family:inherit;cursor:pointer}
  .run{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:3px;font-size:14px;font-weight:700}
  .hint{font-size:11px;color:var(--muted);margin-top:8px;line-height:1.5}
  .res{border:1px solid var(--line);border-radius:3px;margin-bottom:14px}
  .res .in{background:var(--soft);padding:8px 12px;font-size:12px;border-bottom:1px solid var(--line)}
  .res .bd{padding:12px;font-size:13px}
  .row{margin-bottom:8px}
  .badge{display:inline-block;border:1px solid var(--accent);color:var(--accent);border-radius:3px;padding:1px 6px;font-size:11px;margin-left:6px}
  table{width:100%;border-collapse:collapse;font-size:12px;margin-top:6px}
  th,td{padding:4px 6px;border:1px solid var(--line);text-align:left}
  th{background:var(--soft);color:var(--muted);font-weight:600}
  .price{margin-top:8px;padding:8px 10px;background:var(--soft);border-radius:3px;display:flex;justify-content:space-between;align-items:baseline}
  .price b{font-size:20px;color:var(--accent)}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .matrow{display:grid;grid-template-columns:70px 1fr 1fr;gap:8px;margin-bottom:8px;align-items:center}
  .install{position:fixed;left:16px;right:16px;bottom:16px;max-width:688px;margin:0 auto;background:var(--ink);color:#fff;border:none;border-radius:4px;padding:13px;font-size:14px;font-weight:700;display:none;z-index:50}
  .lo{color:var(--accent)} .hi{color:var(--green)} .mut{color:var(--muted)}
  .flx{display:flex;gap:8px;margin-top:10px;align-items:center}
  .fbtn{padding:11px 14px;border:1px solid var(--ink);border-radius:3px;font-size:13px;white-space:nowrap;cursor:pointer}
  .mono{font-family:monospace;font-size:12px}
  .modal-bd{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;justify-content:center;z-index:100}
  .modal{background:#fff;width:100%;max-width:720px;max-height:88vh;overflow:auto;border-radius:12px 12px 0 0;padding:18px 16px calc(18px + env(safe-area-inset-bottom))}
  .modal h2{font-size:16px;font-weight:700;margin:0 0 4px}
  .fixitem{border:1px solid var(--line);border-radius:6px;padding:12px;margin:12px 0;background:var(--soft)}
  .fixhd{font-weight:700;font-size:13px;margin-bottom:8px;word-break:break-all}
  .fixrow{margin-bottom:10px} .fixrow:last-child{margin-bottom:0}
</style>

function fileToBase64(file,cb){var rd=new FileReader();rd.onload=function(ev){var s=String(ev.target.result),i=s.indexOf(",");cb(i>=0?s.slice(i+1):s);};rd.readAsDataURL(file);}
function downscaleImage(file,maxPx,quality,cb){
  var img=new Image(),url=URL.createObjectURL(file);
  img.onload=function(){
    var w=img.naturalWidth,h=img.naturalHeight,scale=Math.min(1,maxPx/Math.max(w,h));
    var cw=Math.max(1,Math.round(w*scale)),ch=Math.max(1,Math.round(h*scale));
    var c=document.createElement("canvas");c.width=cw;c.height=ch;
    c.getContext("2d").drawImage(img,0,0,cw,ch);URL.revokeObjectURL(url);
    var d=c.toDataURL("image/jpeg",quality||0.8),i=d.indexOf(",");cb(d.slice(i+1));
  };
  img.onerror=function(){URL.revokeObjectURL(url);cb(null);}; // 변환 실패(형식 미지원 등)
  img.src=url;
}

// PDF는 pdf.js로 페이지별 이미지로 변환(다중 페이지·대용량 대응, 서버 본문 4.5MB 제한 회피)
function loadPdfJs(){
  if(window.pdfjsLib)return Promise.resolve(window.pdfjsLib);
  return new Promise(function(res,rej){
    var s=document.createElement("script");
    s.src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
    s.onload=function(){if(window.pdfjsLib){try{window.pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";}catch(e){}res(window.pdfjsLib);}else rej(new Error("pdf.js 로드 실패"));};
    s.onerror=function(){rej(new Error("pdf.js 로드 실패(네트워크 확인)"));};
    document.head.appendChild(s);
  });
}
// 선택 파일들을 처리 단위(task)로 전개: 이미지 1장 = 1 task, PDF = 페이지 수만큼 task
function buildTasks(files){
  var tasks=[],chain=Promise.resolve();
  files.forEach(function(f){
    if(/^image\//.test(f.type)){tasks.push({kind:"image",file:f});}
    else if(f.type==="application/pdf"){
      chain=chain.then(function(){
        return loadPdfJs().then(function(pdfjs){
          return f.arrayBuffer().then(function(buf){
            return pdfjs.getDocument({data:new Uint8Array(buf)}).promise.then(function(doc){
              for(var p=1;p<=doc.numPages;p++)tasks.push({kind:"pdfpage",doc:doc,page:p});
            });
          });
        }).catch(function(e){tasks.push({kind:"error",msg:(e&&e.message)||"PDF 처리 실패"});});
      });
    }else{tasks.push({kind:"error",msg:"지원하지 않는 형식"});}
  });
  return chain.then(function(){return tasks;});
}
function renderTask(task){ // Promise<{payload}|{error}>
  if(task.kind==="error")return Promise.resolve({error:task.msg});
  if(task.kind==="image")return new Promise(function(res){downscaleImage(task.file,1400,0.8,function(b){res(b?{payload:{type:"image",media_type:"image/jpeg",data:b}}:{error:"이미지 변환 실패(형식 미지원일 수 있음, JPG/PNG 권장)"});});});
  if(task.kind==="pdfpage")return task.doc.getPage(task.page).then(function(page){
    var vp=page.getViewport({scale:1}),scale=Math.min(2.5,1500/Math.max(vp.width,vp.height)),v=page.getViewport({scale:scale});
    var c=document.createElement("canvas");c.width=Math.round(v.width);c.height=Math.round(v.height);
    return page.render({canvasContext:c.getContext("2d"),viewport:v}).promise.then(function(){
      var d=c.toDataURL("image/jpeg",0.8),i=d.indexOf(",");
      c.width=0;c.height=0;if(page.cleanup)try{page.cleanup();}catch(e){} // 대량 처리 시 메모리 해제
      return{payload:{type:"image",media_type:"image/jpeg",data:d.slice(i+1)}};
    });
  }).catch(function(){return{error:"PDF 페이지 변환 실패"};});
  return Promise.resolve({error:"알 수 없는 작업"});
}
function postExtract(payload,attempt){
  return fetchT("/api/extract",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({files:[payload]})},60000)
    .then(function(r){return r.text().then(function(tx){var j;try{j=JSON.parse(tx);}catch(e){j={error:"서버가 JSON이 아닌 응답을 반환했습니다(HTTP "+r.status+"). 함수 미배포(404)이거나 서버 오류일 수 있습니다."};}return{ok:r.ok,status:r.status,j:j};});})
    .then(function(o){
      if(o.ok)return{text:((o.j&&o.j.text)||"").trim()};
      if((o.status===429||o.status>=500)&&attempt<2)return delay(1200*(attempt+1)).then(function(){return postExtract(payload,attempt+1);});
      return{error:(o.j&&o.j.error)||("HTTP "+o.status)};
    })
    .catch(function(err){
      if(attempt<2)return delay(1200*(attempt+1)).then(function(){return postExtract(payload,attempt+1);});
      return{error:(err&&err.message)||"네트워크 오류"};
    });
}
function extractFromDrawings(tasks){ // 동시 4개씩, 각 task를 이미지로 변환→인식
  var total=tasks.length,done=0,fail=0,lines=[],idx=0,active=0,CONC=4,firstError="";
  showOcrProgress(0,total,0);
  return new Promise(function(resolve){
    function finishOne(res){
      if(res.error){fail++;if(!firstError)firstError=res.error;}else if(res.text){lines.push(res.text);}
      done++;active--;showOcrProgress(done,total,fail);
      if(done>=total)resolve({text:lines.join("\n"),fail:fail,total:total,error:firstError});
      else launch();
    }
    function launch(){
      while(active<CONC&&idx<total){
        (function(task){
          active++;
          renderTask(task).then(function(rt){
            if(rt.error){finishOne({error:rt.error});return;}
            postExtract(rt.payload,0).then(finishOne);
          });
        })(tasks[idx++]);
      }
    }
    if(total===0){resolve({text:"",fail:0,total:0,error:""});return;}
    launch();
  });
}
function startDrawingUpload(files){
  if(!files.length)return;

    if(pages>50&&!window.confirm(pages.toLocaleString()+"페이지를 인식합니다.\n페이지가 많으면 시간·API 비용이 늘어납니다(대략 페이지당 1~3초).\n\n계속할까요? (너무 많으면 파일을 나눠 올리는 걸 권장)")){return Promise.reject({__cancel:1});}
    return extractFromDrawings(tasks);

    hideOcr();
    // 실링 품목 줄과 '자동견적 범위 밖' 요약(#INFO)을 분리
    var infos=[],items=[];
    (r.text||"").split(/\r?\n/).forEach(function(l){var t=l.trim();if(!t)return;if(/^#INFO/i.test(t))infos.push(t.replace(/^#INFO\s*/i,"").trim());else items.push(l);});
    state.drawingInfo=infos.length?infos:null;

      showInfo("도면 인식 실패","도면/페이지 "+r.total+"건에서 품목을 인식하지 못했습니다."+(r.fail?(" ("+r.fail+"건 실패)"):"")
        +(r.error?("\n\n원인: "+r.error):"")
        +"\n\n• 도면이 흐리면 더 선명한 이미지를 올리거나 직접 입력해 주세요.");
      return;
    }
    state.text=itemText;runPipeline();renderRun();
    if(infos.length)showInfo("자동 견적 대상이 아닐 수 있어요",
      "이 도면은 고무 실링 부품(오일씰·오링·패킹) 자동견적 범위 밖으로 보입니다(예: 가공 금속 부품).\n\n[도면에서 읽은 정보]\n• "+infos.join("\n• ")+"\n\n※ 위 정보를 담당자에게 전달해 확인해 주세요. (아래 화면에도 표시됩니다)");
    if(itemText&&missingResults().length>0)openFixModal();
    else if(itemText&&r.fail&&!infos.length)showInfo("일부 인식 실패",r.total+"건 중 "+r.fail+"건은 실패해 제외했습니다."+(r.error?("\n\n예시 원인: "+r.error):"")+"\n나머지로 견적을 구성했습니다.");
  }).catch(function(e){hideOcr();if(e&&e.__cancel)return;showInfo("처리 오류",(e&&e.message)||"파일 처리 중 오류가 발생했습니다.");});
}

    +'<label style="margin-top:8px">수량 구간 단가계수 (이상 수량 → ×계수)</label>'
    +'<div class="matrow" style="grid-template-columns:1fr 1fr;font-size:11px;color:var(--muted)"><span>최소수량(개)</span><span>단가계수(×)</span></div>';
  qt.forEach(function(t,i){html+='<div class="matrow" style="grid-template-columns:1fr 1fr"><input class="ck" data-p="qtyTiers.'+i+'.0" value="'+t[0]+'"><input class="ck" data-p="qtyTiers.'+i+'.1" value="'+t[1]+'"></div>';});
  html+='<div class="hint">예: 1개~ ×1.15(소량 할증), 1000개~ ×0.78(대량 할인). 추천가는 기준가×수량계수×마진, 최소단가 미만이면 최소단가 적용.</div></div>';
  var pf=state.cfg.profiles||(state.cfg.profiles={});
  html+='<div class="card"><h2>단면 프로파일 (형상 기반 · 단가표보다 우선)</h2>'
    +'<div class="hint" style="margin-top:0">우리 제품의 실제 단면을 등록하면 코드명과 무관하게 형상 기준으로 계산됩니다. <b>충전율</b>(단면이 외접사각을 채우는 비율 0~1)·<b>재료 원/g</b>·<b>가공·고정비</b>를 넣으면 그 타입은 이 식으로 계산: 가격 = 가공비 + (충전율 × 반경두께 × 높이 × π × 평균지름) × 비중 × 원/g. <b>충전율을 비우면</b> 아래 단가표를 사용합니다.</div>'
    +'<div class="matrow" style="grid-template-columns:90px 1fr 1fr 1fr;font-size:11px;color:var(--muted)"><span>적용대상</span><span>충전율</span><span>원/g</span><span>가공·고정비</span></div>';
  ["TC","SC","TCN","TCV","SB","TB","VC","OIL SEAL","U-PACKING","DUST SEAL","WEAR RING"].forEach(function(k){
    var p=pf[k]||{};
    html+='<div class="matrow" style="grid-template-columns:90px 1fr 1fr 1fr"><span style="font-size:12px">'+k+'</span>'
      +'<input class="ck" data-p="profiles.'+k+'.fill" value="'+(p.fill!=null?p.fill:"")+'" placeholder="0~1">'
      +'<input class="ck" data-p="profiles.'+k+'.matG" value="'+(p.matG!=null?p.matG:"")+'" placeholder="원/g">'
      +'<input class="ck" data-p="profiles.'+k+'.proc" value="'+(p.proc!=null?p.proc:"")+'" placeholder="원"></div>';
  });
  html+='<div class="hint" style="margin-top:6px">예: 우리 TC 단면을 측정해 충전율 0.4·NBR 25원/g·가공 2000원 식으로. 외부 타사 제품은 도면을 받아 처리하세요.</div></div>';
  var ct=state.cfg.cost;
  html+='<div class="card"><h2>거래내역 단가표 (고정비 + 원/g)</h2>'
    +'<div class="hint" style="margin-top:0">회사 거래내역(2024~)으로 산출한 단가표입니다. 가격 = 고정비 + 무게(g) × 원/g. 실제 단가로 조정하면 즉시 반영·저장됩니다.</div>';
  ["O-RING","OIL SEAL","DUST SEAL","U-PACKING","BACK UP RING","WEAR RING"].forEach(function(cat){
    var fc=ct.fit[cat];if(!fc)return;
    html+='<div style="margin-top:10px"><label style="font-weight:700;color:var(--ink)">'+cat+'</label>';
    Object.keys(fc).forEach(function(m){
      var ab=fc[m],nm2=(m==="_def"?"기타재질":m);
      html+='<div class="matrow" style="grid-template-columns:80px 1fr 1fr"><span style="font-size:12px">'+nm2+'</span>'
        +'<input class="ck" data-p="fit.'+cat+'.'+m+'.0" value="'+ab[0]+'" placeholder="고정비">'
        +'<input class="ck" data-p="fit.'+cat+'.'+m+'.1" value="'+ab[1]+'" placeholder="원/g"></div>';
    });
    html+='</div>';
  });
  html+='<div class="hint" style="margin-top:8px">각 줄: [고정비(원) · 원/g]. "기타재질"은 해당 제품군에서 매칭 안 되는 재질의 기본값입니다.</div></div>';
  var pane=document.getElementById("paneCfg");
  pane.innerHTML=html;
  // 바인딩
  Array.prototype.forEach.call(pane.querySelectorAll(".den"),function(el){el.oninput=function(){state.cfg.density[el.getAttribute("data-m")]=parseFloat(el.value)||0;persist();};});
  Array.prototype.forEach.call(pane.querySelectorAll(".up"),function(el){el.oninput=function(){state.cfg.unitPrice[el.getAttribute("data-m")]=parseFloat(el.value)||0;persist();};});
  pane.querySelector("#fc").oninput=function(e){state.cfg.fixedCost=parseFloat(e.target.value)||0;persist();};
  pane.querySelector("#lr").oninput=function(e){state.cfg.lossRate=parseFloat(e.target.value)||0;persist();};
  pane.querySelector("#qf").oninput=function(e){state.cfg.qtyFactor=parseFloat(e.target.value)||1;persist();};
  function ensureAi(){state.cfg.ai=state.cfg.ai||{nComp:6,sameMatOnly:false};return state.cfg.ai;}
  pane.querySelector("#aiN").oninput=function(e){ensureAi().nComp=Math.max(1,Math.min(12,parseInt(e.target.value)||6));persist();};
  pane.querySelector("#aiS").onchange=function(e){ensureAi().sameMatOnly=e.target.value==="1";persist();};
  Array.prototype.forEach.call(pane.querySelectorAll(".ck"),function(el){el.oninput=function(){
    var p=el.getAttribute("data-p").split("."),o=state.cfg.cost;
    for(var i=0;i<p.length-1;i++)o=o[p[i]]=o[p[i]]||{};
    o[p[p.length-1]]=parseFloat(el.value)||0;persist();
  };});
  var akBtn=pane.querySelector("#appKeySave");
  if(akBtn)akBtn.onclick=function(){var v=(pane.querySelector("#appKey")||{}).value||"";APP_KEY=v.trim();window.__authNotified=0;try{APP_KEY?localStorage.setItem("hsq_appkey",APP_KEY):localStorage.removeItem("hsq_appkey");}catch(e){}var m=pane.querySelector("#appKeyMsg");if(m)m.textContent="저장됨. 데이터를 다시 불러옵니다…";loadPriceHistory();};
  var upBtn=pane.querySelector("#upBtn");
  if(upBtn)upBtn.onclick=function(){
    var fEl=pane.querySelector("#upFile"),f=fEl&&fEl.files&&fEl.files[0],key=(pane.querySelector("#upKey")||{}).value,st=pane.querySelector("#upStat");
    var set=function(t){if(st)st.textContent=t;};
    if(!f){set("거래내역 엑셀(.xlsx) 파일을 선택하세요.");return;}
    if(!key){set("관리자 비밀번호를 입력하세요.");return;}
    upBtn.disabled=true;
    rebuildFromFile(f,key,set).then(function(r){
      set("✅ 완료: "+(r.note||"")+" · 품목키 "+r.keys.toLocaleString()+"개. 새 데이터를 불러옵니다…");
      upBtn.disabled=false;loadPriceHistory();
    }).catch(function(e){set("❌ 실패: "+((e&&e.message)?e.message:String(e)));upBtn.disabled=false;});
  };
}

function switchTab(t){
  state.tab=t;
  document.getElementById("tabRun").className="tab"+(t==="run"?" on":"");
  document.getElementById("tabCfg").className="tab"+(t==="config"?" on":"");
  document.getElementById("paneRun").style.display=t==="run"?"":"none";
  document.getElementById("paneCfg").style.display=t==="config"?"":"none";
  if(t==="config")renderCfg();
}
document.getElementById("tabRun").onclick=function(){switchTab("run");};
document.getElementById("tabCfg").onclick=function(){switchTab("config");};

// 초기 실행
runPipeline();
renderRun();
loadPriceHistory();

// ===== PWA service worker =====
if("serviceWorker" in navigator){
  try{
    // network-first: 온라인이면 항상 최신본을 받아 캐시 갱신, 오프라인일 때만 캐시 사용(설치된 PWA가 업데이트를 받도록)
    var swCode='var C="hansung-quote-v18";self.addEventListener("install",function(e){self.skipWaiting();});self.addEventListener("activate",function(e){e.waitUntil(Promise.all([clients.claim(),caches.keys().then(function(ks){return Promise.all(ks.map(function(k){return k===C?null:caches.delete(k);}));})]));});self.addEventListener("fetch",function(e){if(e.request.method!=="GET")return;e.respondWith(fetch(e.request).then(function(res){if(res&&res.ok){var cl=res.clone();caches.open(C).then(function(c){c.put(e.request,cl);});}return res;}).catch(function(){return caches.match(e.request);}));});';
    var blob=new Blob([swCode],{type:"text/javascript"});
    navigator.serviceWorker.register(URL.createObjectURL(blob))["catch"](function(){});
  }catch(e){}
}
// ===== 설치 버튼 =====
var deferredPrompt=null;
var btn=document.getElementById("installBtn");
window.addEventListener("beforeinstallprompt",function(e){e.preventDefault();deferredPrompt=e;btn.style.display="block";});
btn.addEventListener("click",function(){if(!deferredPrompt)return;deferredPrompt.prompt();deferredPrompt.userChoice.then(function(){deferredPrompt=null;btn.style.display="none";});});
window.addEventListener("appinstalled",function(){btn.style.display="none";});
</script>
</body>
